<!DOCTYPE html>
<html>
<head>
    <title>FAQ Chatbot</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
            text-align:center;
        }

        #chatbox{
            width:500px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        #messages{
            height:300px;
            overflow-y:auto;
            border:1px solid gray;
            padding:10px;
            margin-bottom:10px;
            text-align:left;
        }

        input{
            width:75%;
            padding:10px;
        }

        button{
            padding:10px;
        }

    </style>

</head>

<body>

<h1>FAQ Chatbot</h1>

<div id="chatbox">

    <div id="messages"></div>

    <input type="text" id="userInput" placeholder="Type your question">

    <button onclick="sendMessage()">Send</button>

</div>

<script>

function sendMessage(){

    let input =
    document.getElementById("userInput");

    let message = input.value;

    fetch("/get",{
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:"message="+encodeURIComponent(message)
    })

    .then(response=>response.json())

    .then(data=>{

        let messages =
        document.getElementById("messages");

        messages.innerHTML +=
        "<p><b>You:</b> " + message + "</p>";

        messages.innerHTML +=
        "<p><b>Bot:</b> " + data.response + "</p>";

        input.value="";

    });

}

</script>

</body>
</html>
